apiVersion: v1
kind: Service
metadata:
  name: dispatcher-service
spec:
  type: NodePort          # NodePort because the Load Tester runs OUTSIDE
  selector:               # the cluster (on your host machine)
    app: dispatcher
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
      nodePort: 30001     # Fixed port on the Minikube node's IP